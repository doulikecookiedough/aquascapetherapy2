services:
  postgres:
    image: postgres:17
    container_name: aquascapetherapy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aquascapetherapy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aquascapetherapy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aquascapetherapy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aquascapetherapy_postgres_data:
