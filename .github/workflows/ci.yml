name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create development and test databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT 'CREATE DATABASE aquascapetherapy' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'aquascapetherapy')\gexec"
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT 'CREATE DATABASE aquascapetherapy_test' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'aquascapetherapy_test')\gexec"

      - name: Write CI environment files
        run: |
          cat <<'EOF' > .env
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/aquascapetherapy?schema=public"
          POSTGRES_DB="aquascapetherapy"
          POSTGRES_USER="postgres"
          POSTGRES_PASSWORD="postgres"
          EOF

          cat <<'EOF' > .env.test
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/aquascapetherapy_test"
          POSTGRES_DB="aquascapetherapy_test"
          POSTGRES_USER="postgres"
          POSTGRES_PASSWORD="postgres"
          EOF

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply development database migrations
        run: npx prisma migrate deploy

      - name: Apply test database migrations
        run: npm run prisma:migrate:test

      - name: Run lint
        run: npm run lint

      - name: Run test suite
        run: npm test
